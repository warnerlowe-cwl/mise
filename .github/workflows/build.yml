name: Build Mise Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            artifact: macos
          - platform: windows-latest
            args: ''
            artifact: windows
          - platform: ubuntu-22.04
            args: ''
            artifact: linux

    runs-on: ${{ matrix.platform }}

    # Optional features keyed off whether their secrets exist:
    #  - HAS_R2: upload installers to Cloudflare R2 (else they ship via the GitHub Release)
    #  - HAS_APPLE: code-sign + notarize the macOS build (else it builds UNSIGNED, which
    #    is what works until an Apple Developer ID cert is added — passing empty Apple
    #    env vars makes tauri-action attempt signing and fail, so we omit them entirely).
    env:
      HAS_R2: ${{ secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_BUCKET != '' }}
      HAS_APPLE: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Install frontend deps
        run: npm ci

      # macOS WITH a Developer ID cert → signed + notarized (runs only when APPLE_CERTIFICATE exists)
      - name: Build Tauri app (macOS signed)
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MISE_API_URL: ${{ secrets.VITE_MISE_API_URL }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # Auto-updater signing — tauri-action produces signed update artifacts + latest.json
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Mise ${{ github.ref_name }}
          releaseBody: |
            ## Mise ${{ github.ref_name }}
            **Restaurant & hospitality management — by CrownWell Labs**
            Download at [crownwelllabs.com/downloads](https://crownwelllabs.com/downloads)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Everything else: Windows, Linux, and macOS-without-a-cert → UNSIGNED (no Apple env)
      - name: Build Tauri app (unsigned)
        if: matrix.platform != 'macos-latest' || env.HAS_APPLE != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MISE_API_URL: ${{ secrets.VITE_MISE_API_URL }}
          # Auto-updater signing — tauri-action produces signed update artifacts + latest.json
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Mise ${{ github.ref_name }}
          releaseBody: |
            ## Mise ${{ github.ref_name }}
            **Restaurant & hospitality management — by CrownWell Labs**
            Download at [crownwelllabs.com/downloads](https://crownwelllabs.com/downloads)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload to R2 (macOS)
        if: matrix.platform == 'macos-latest' && env.HAS_R2 == 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          TAG: ${{ github.ref_name }}
          PLATFORM: macos
        run: |
          python3 -m pip install boto3 --quiet --break-system-packages
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          [ -z "$DMG" ] && DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          APPTARGZ=$(find src-tauri/target -name "*.app.tar.gz" 2>/dev/null | head -1)
          FILE="$DMG" APPTARGZ="$APPTARGZ" python3 .github/scripts/upload_r2.py

      - name: Upload to R2 (Windows)
        if: matrix.platform == 'windows-latest' && env.HAS_R2 == 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          TAG: ${{ github.ref_name }}
          PLATFORM: windows
        shell: pwsh
        run: |
          python3 -m pip install boto3 --quiet --user
          $env:FILE = (Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*.exe" | Select-Object -First 1).FullName
          python3 .github/scripts/upload_r2.py

      - name: Upload to R2 (Linux)
        if: matrix.platform == 'ubuntu-22.04' && env.HAS_R2 == 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          TAG: ${{ github.ref_name }}
          PLATFORM: linux
        run: |
          python3 -m pip install boto3 --quiet
          export APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          export DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          python3 .github/scripts/upload_r2.py

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    env:
      HAS_R2: ${{ secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_BUCKET != '' }}
    steps:
      - uses: actions/checkout@v4

      # Publish the updater manifest to PUBLIC R2 (the repo is private, so the GitHub
      # release URLs aren't reachable by end users). Points each platform at its R2 URL
      # and uploads mise/latest.json with no-cache. Only runs when R2 is configured.
      - name: Publish updater manifest to R2
        if: env.HAS_R2 == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python3 -m pip install boto3 --quiet --break-system-packages
          python3 .github/scripts/upload_manifest_r2.py

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          {
            echo "## Mise ${TAG}"
            echo ""
            echo "Restaurant & hospitality management — by CrownWell Labs"
            echo ""
            echo "### Download"
            if [ "$HAS_R2" = "true" ]; then
              echo "| Platform | Link |"
              echo "|---|---|"
              echo "| Windows 10/11 | [Mise-Setup-Windows.exe](https://downloads.crownwelllabs.com/mise/${TAG}/Mise-Setup-Windows.exe) |"
              echo "| macOS 12+ | [Mise-macOS.dmg](https://downloads.crownwelllabs.com/mise/${TAG}/Mise-macOS.dmg) |"
              echo "| Ubuntu/Debian | [Mise-linux-amd64.deb](https://downloads.crownwelllabs.com/mise/${TAG}/Mise-linux-amd64.deb) |"
              echo "| Linux (other) | [Mise-linux-x86_64.AppImage](https://downloads.crownwelllabs.com/mise/${TAG}/Mise-linux-x86_64.AppImage) |"
            else
              echo "Installers for **Windows**, **macOS**, and **Linux** are attached to this release below."
            fi
            echo ""
            echo "> Sign in at [crownwelllabs.com/downloads](https://crownwelllabs.com/downloads)"
          } > /tmp/notes.md
          gh release edit "$TAG" --repo warnerlowe-cwl/mise --draft=false --notes-file /tmp/notes.md
