name: Build Mise Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MISE_API_URL: ${{ secrets.VITE_MISE_API_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Mise ${{ github.ref_name }}
          releaseBody: |
            ## Mise ${{ github.ref_name }}

            **Restaurant & hospitality management — by CrownWell Labs**

            Free to download. Sign in at [crownwelllabs.com/downloads](https://crownwelllabs.com/downloads) for Pro and Lifetime plans.

            Licensed under the [CrownWell Labs Community License v1.0](https://github.com/warnerlowe-cwl/mise/blob/main/LICENSE).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
